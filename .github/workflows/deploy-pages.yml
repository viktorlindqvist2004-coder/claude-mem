name: Deploy landing pages to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/axion-studio-landing-8mjkki
      - claude/salon-hero-website-pg9kql
    paths:
      - "axion-studio/**"
      - "salon-website/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install axion-studio dependencies
        working-directory: axion-studio
        run: npm ci

      - name: Build axion-studio
        working-directory: axion-studio
        env:
          BASE_PATH: /claude-mem/sunt-fornuft/
        run: npm run build

      - name: Install salon-website dependencies
        working-directory: salon-website
        run: npm ci

      - name: Build salon-website
        working-directory: salon-website
        env:
          BASE_PATH: /claude-mem/barbershop/
        run: npm run build

      - name: Combine sites (preserve existing root content)
        run: |
          mkdir -p _site/sunt-fornuft
          cp -r axion-studio/dist/* _site/sunt-fornuft/
          mkdir -p _site/barbershop
          cp -r salon-website/dist/* _site/barbershop/

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
